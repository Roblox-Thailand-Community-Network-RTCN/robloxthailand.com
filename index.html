<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RTCN — Coming Soon. Connecting the Thai Roblox community.">
    <title>RTCN | Coming Soon</title>
    
    <!-- DM Sans Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #09090b;
            --fg: #fafafa;
            --fg-muted: #a1a1aa;
            --fg-dim: #71717a;
            --border: #ffffff14;
            --accent: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Grain Effect Overlay */
        body::after {
            content: "";
            pointer-events: none;
            opacity: 0.035;
            z-index: 9999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px 256px;
            position: fixed;
            inset: 0;
        }

        /* Navigation */
        .nav {
            padding: 1.5rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0.8;
            transition: opacity 0.4s;
        }

        .nav:hover {
            opacity: 1;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: -0.01em;
        }

        .nav-brand img {
            width: 32px;
            height: 32px;
            border-radius: 50%; /* Rounded Circle Icon */
            object-fit: cover;
            border: 1px solid var(--border);
        }

        .nav-links {
            display: flex;
            gap: 0.75rem;
        }

        /* Rounded Buttons for Links */
        .btn-link {
            padding: 0.5rem 1rem;
            border-radius: 999px;
            font-size: 0.825rem;
            font-weight: 500;
            border: 1px solid var(--border);
            color: var(--fg-muted);
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.03);
        }

        .btn-link:hover {
            color: var(--fg);
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--fg-muted);
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10vh;
            text-align: center;
        }

        .tagline {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 500;
            letter-spacing: -0.035em;
            line-height: 1.15;
            margin-bottom: 2rem;
            max-width: 800px;
            animation: fadeIn 1s ease-out forwards;
        }

        .coming-soon-badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 0.5rem 1.25rem;
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--fg-muted);
            margin-bottom: 6vh;
            animation: fadeIn 1s ease-out 0.2s forwards;
            opacity: 0;
        }

        /* Custom Image Preview Container */
        .preview-container {
            width: min(95vw, 1200px);
            margin: 0 auto;
            position: relative;
            animation: slideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .custom-screenshot-wrap {
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.5);
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            background: #111113;
        }

        .custom-screenshot-wrap img {
            width: 100%;
            display: block;
            /* Placeholder styles if image fails */
            min-height: 400px;
            object-fit: cover;
        }

        /* Footer */
        footer {
            padding: 2rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--fg-dim);
        }

        .footer-links a:hover {
            color: var(--fg);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @media (max-width: 768px) {
            .nav { flex-direction: column; gap: 1.5rem; padding: 2rem 1rem; }
            footer { flex-direction: column; gap: 1rem; text-align: center; }
            .tagline { padding: 0 1.5rem; }
        }
    </style>
</head>
<body>

            <a href="https://www.facebook.com/RobloxThailandCommunity" class="btn-link" target="_blank">Facebook</a>

        </div>
    </footer>
</body>
